<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica en pantalla - Daily Origami</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coming+Soon&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fff6ef;
      --bg-soft: #fffaf5;
      --surface: #FFB347;
      --surface-soft: #fffdf9;
      --primary: #f2bc8d;
      --primary-dark: #9b6540;
      --primary-soft: #f8dfc9;
      --accent: #e8a46f;
      --target: #ffffff;
      --text: #6f5646;
      --text-soft: #8c715d;
      --shadow: 0 14px 28px rgba(111, 86, 70, 0.10);
      --shadow-soft: 0 8px 18px rgba(111, 86, 70, 0.07);
      --radius-xl: 28px;
      --radius-md: 18px;
      --font-title: "Coming Soon", cursive;
      --font-body: "Nunito", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(242,188,141,0.18), transparent 28%),
        radial-gradient(circle at 88% 84%, rgba(232,164,111,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        radial-gradient(rgba(111,86,70,0.08) 0.6px, transparent 0.6px),
        radial-gradient(rgba(111,86,70,0.05) 0.5px, transparent 0.5px);
      background-size: 16px 16px, 24px 24px;
      background-position: 0 0, 10px 12px;
    }

    header {
      max-width: 480px;
      margin: 0 auto;
      padding: 18px 16px 0;
    }

    .nav-card {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--primary-soft);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
    }

    .nav-card a {
      display: inline-block;
      padding: 11px 16px 12px;
      color: var(--primary-dark);
      text-decoration: none;
      font-family: var(--font-title);
      font-size: 17px;
      background: var(--surface-soft);
      border: 1px solid rgba(155,101,64,0.14);
      border-radius: 999px;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .practice-card {
     position: relative; 
overflow: hidden;
      padding: 10px 18px 10px; /* Tightened padding */
      border-radius: var(--radius-xl);
      border: 1px solid var(--primary-soft);
       border-top: 10px solid var(--primary); 

box-shadow: var(--shadow);
      text-align: center;
      background: linear-gradient(180deg, var(--surface) 0%, #D1FEB8 100%);
    }

    .practice-card::before {
      content: "";
      display: block;
      height: 10px;
      margin: -24px -18px 20px;
      background: var(--primary);
    }

    .label {
      margin: 0 0 6px;
      color: var(--primary-dark);
      font-family: var(--font-title);
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--primary-dark);
      font-family: var(--font-title);
      font-size: 38px;
      line-height: 1.08;
    }

    .description {
      margin: 0 0 18px;
      padding: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--primary-soft);
      border-radius: var(--radius-md);
      color: var(--primary-dark);
      font-family: var(--font-title);
      font-size: 21px;
      line-height: 1.34;
      text-align: left;
    }

    .practice-stage {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,0.72), transparent 35%),
        linear-gradient(180deg, #FDD7B8 0%, #D1FEB8 100%);
      border: 1px solid var(--primary-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
      touch-action: none;
      user-select: none;
    }

    .practice-top {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .level-name {
      color: var(--primary-dark);
      font-family: var(--font-title);
      font-size: 18px;
      line-height: 1.05;
    }

    .progress-diamonds {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .diamond {
      width: 7px;
      height: 7px;
      border: 1px solid rgba(155,101,64,0.32);
      transform: rotate(45deg);
      background: rgba(255,255,255,0.5);
    }

    .diamond.filled {
      background: var(--accent);
      border-color: var(--primary-dark);
    }

       canvas {
      display: block;
      width: 100%;
      max-width: 300px; /* Reduced width to shorten the whole card */
      margin: 0 auto;
      aspect-ratio: 350 / 430;
      touch-action: none;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .status {
      margin-top: 14px;
      color: var(--primary-dark);
      font-size: 15px;
      font-weight: 800;
    }

    .practice-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .practice-button {
      padding: 11px 16px 12px;
      color: var(--primary-dark);
      text-decoration: none;
      font-family: var(--font-title);
      font-size: 17px;
      background: var(--surface-soft);
      border: 1px solid rgba(155,101,64,0.14);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
    }

    .practice-button.primary {
      background: var(--primary);
    }

    .practice-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .confirmation-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(111,86,70,0.22);
      backdrop-filter: blur(4px);
    }

    .confirmation-overlay.visible {
      display: flex;
    }

    .confirmation-window {
      width: min(330px, 100%);
      padding: 22px 18px 18px;
      border-radius: 28px;
      background: var(--surface-soft);
      border: 1px solid var(--primary-soft);
      box-shadow: 0 18px 38px rgba(111,86,70,0.18);
      text-align: center;
    }

    .confirmation-window h2 {
      margin: 0 0 8px;
      color: var(--primary-dark);
      font-family: var(--font-title);
      font-size: 31px;
      line-height: 1.1;
    }

    .confirmation-window p {
      margin: 0 0 16px;
      color: var(--text-soft);
      font-size: 15px;
      font-weight: 800;
    }

    .confirmation-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    footer {
      max-width: 480px;
      margin: 0 auto 28px;
      padding: 0 16px 18px;
    }

    .footer-inner {
      display: flex;
      justify-content: center;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--primary-soft);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
    }

    .footer-inner a {
      padding: 11px 16px 12px;
      color: var(--primary-dark);
      text-decoration: none;
      font-family: var(--font-title);
      font-size: 17px;
      background: var(--surface-soft);
      border: 1px solid rgba(155,101,64,0.14);
      border-radius: 999px;
    }
  </style>
</head>

<body>
  <header>
    <nav class="nav-card">
      <a href="index.html">Inicio</a>
      <a href="progreso.html">Progreso Personal</a>
      <a href="desafio-dia.html">Desafío del día</a>
    </nav>
  </header>

  <main>
    <section class="practice-card">
      <p class="label">Práctica en pantalla</p>
      <h1>Práctica pliegues</h1>

      <p class="description">
        Pliega el papel en pantalla hasta que coincida con la figura punteada.
      </p>

      <div class="practice-stage">
        <div class="practice-top">
          <div class="level-name">Figura<br>1</div>
          <div class="progress-diamonds" id="progressDiamonds"></div>
        </div>

        <canvas id="foldCanvas" width="350" height="430" aria-label="Práctica de pliegue"></canvas>
      </div>

      <div class="status" id="status">Haz coincidir el papel con la figura punteada</div>

      <div class="practice-buttons">
        <button class="practice-button" type="button" onclick="resetFigure()">Reiniciar</button>
        <button class="practice-button primary" type="button" disabled>Figura anterior</button>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <a href="index.html">Inicio</a>
    </div>
  </footer>

  <div class="confirmation-overlay" id="confirmationOverlay">
    <div class="confirmation-window">
      <h2>¡Buen pliegue!</h2>
      <p>Has completado esta figura.</p>

      <div class="confirmation-actions">
        <!-- Stay and look at the figure -->
        <button class="practice-button" type="button" onclick="document.getElementById('confirmationOverlay').classList.remove('visible')">Volver a la figura</button>
        <!-- Go to next level -->
        <button class="practice-button primary" type="button" onclick="nextFigure()">Siguiente figura</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("foldCanvas");
    const ctx = canvas.getContext("2d");

    const statusText = document.getElementById("status");
    const progressDiamonds = document.getElementById("progressDiamonds");
    const confirmationOverlay = document.getElementById("confirmationOverlay");

    const view = {
      width: 350,
      height: 430
    };

    const paper = {
      topLeft: { x: 88, y: 128 },
      topRight: { x: 262, y: 128 },
      bottomRight: { x: 262, y: 302 },
      bottomLeft: { x: 88, y: 302 }
    };

    const figure = {
      handleStart: paper.topLeft,
      handleTarget: paper.bottomRight,
      creaseA: paper.bottomLeft,
      creaseB: paper.topRight,
      finalShape: [paper.bottomLeft, paper.bottomRight, paper.topRight],
      badge: { x: 222, y: 246 }
    };

    // Simplified - removed complex fiber texture for better performance

    let handle = { ...figure.handleStart };
    let progress = 0;
    let dragging = false;
    let completed = false;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function pointerToCanvas(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (view.width / rect.width),
        y: (event.clientY - rect.top) * (view.height / rect.height)
      };
    }

    function progressFromHandle(point) {
      const start = figure.handleStart;
      const target = figure.handleTarget;

      const vx = target.x - start.x;
      const vy = target.y - start.y;
      const wx = point.x - start.x;
      const wy = point.y - start.y;

      const total = vx * vx + vy * vy;
      const projected = total === 0 ? 0 : (wx * vx + wy * vy) / total;

      return clamp(projected, 0, 1);
    }

    function roundedCornerPoint() {
      return {
        x: lerp(handle.x, figure.handleTarget.x, 0.08 * progress),
        y: lerp(handle.y, figure.handleTarget.y, 0.08 * progress)
      };
    }

    function baseVisibleShape() {
      if (progress < 0.03) {
        return [
          paper.topLeft,
          paper.topRight,
          paper.bottomRight,
          paper.bottomLeft
        ];
      }

      return [
        paper.bottomLeft,
        paper.bottomRight,
        paper.topRight
      ];
    }

    function foldedFlapShape() {
      const softHandle = roundedCornerPoint();
      return [
        figure.creaseA,
        softHandle,
        figure.creaseB
      ];
    }

    function beginPolygon(points) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);

      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }

      ctx.closePath();
    }

    function drawCurvedFlap(points) {
      const a = points[0];
      const h = points[1];
      const b = points[2];
      const lift = Math.sin(progress * Math.PI);

      const sidePull = 12 * lift;
      const topPull = 28 * lift;

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);

      ctx.quadraticCurveTo(
        lerp(a.x, h.x, 0.48) - sidePull,
        lerp(a.y, h.y, 0.48) - topPull,
        h.x,
        h.y
      );

      ctx.quadraticCurveTo(
        lerp(h.x, b.x, 0.48) + sidePull,
        lerp(h.y, b.y, 0.48) - topPull,
        b.x,
        b.y
      );

      ctx.closePath();
    }

    function clipToPath(drawPath) {
      ctx.save();
      drawPath();
      ctx.clip();
    }

    // Simplified texture function - removed for performance
    function drawTexture(drawPath, opacity) {
      // No texture rendering for better performance
    }

    function drawTarget() {
      ctx.save();

      ctx.setLineDash([12, 10]);
      ctx.lineWidth = 2.8;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#9B6540";

      ctx.beginPath();
      ctx.moveTo(figure.finalShape[0].x, figure.finalShape[0].y);
      ctx.lineTo(figure.finalShape[1].x, figure.finalShape[1].y);
      ctx.lineTo(figure.finalShape[2].x, figure.finalShape[2].y);
      ctx.closePath();
      ctx.stroke();

      ctx.restore();
    }

    function drawMainShadow() {
      const lift = Math.sin(progress * Math.PI);
      const shape = baseVisibleShape();

      ctx.save();
      ctx.filter = "blur(8px)";
      ctx.translate(5, 9);

      beginPolygon(shape);
      ctx.fillStyle = `rgba(111, 86, 70, ${0.10 + lift * 0.02})`;
      ctx.fill();

      if (progress > 0.04) {
        ctx.translate(5 * lift, 4 * lift);
        drawCurvedFlap(foldedFlapShape());
        ctx.fillStyle = `rgba(111, 86, 70, ${0.07 + lift * 0.08})`;
        ctx.fill();
      }

      ctx.restore();
    }

    function drawBasePaper() {
      const shape = baseVisibleShape();

      const gradient = ctx.createLinearGradient(88, 128, 262, 302);
      gradient.addColorStop(0, "#fffdf8");
      gradient.addColorStop(0.62, "#fff5e9");
      gradient.addColorStop(1, "#ead7c3");

      ctx.save();
      beginPolygon(shape);
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.lineWidth = 1.25;
      ctx.strokeStyle = "rgba(111,86,70,0.2)";
      ctx.stroke();
      ctx.restore();

      // Texture removed for performance
    }

    function drawFoldedFlap() {
      const points = foldedFlapShape();
      const lift = Math.sin(progress * Math.PI);

      if (progress < 0.02) return;

      const gradient = ctx.createLinearGradient(handle.x, handle.y, 175, 215);
      gradient.addColorStop(0, "#fffaf2");
      gradient.addColorStop(0.48, "#f4dfc8");
      gradient.addColorStop(1, "#ddb990");

      ctx.save();

      ctx.shadowColor = `rgba(111,86,70,${0.10 + lift * 0.14})`;
      ctx.shadowBlur = 5 + lift * 10;
      ctx.shadowOffsetX = 3 * lift;
      ctx.shadowOffsetY = 6 * lift;

      drawCurvedFlap(points);
      ctx.fillStyle = "#97d678";
      ctx.fill();

      ctx.shadowColor = "transparent";
      ctx.lineWidth = 1.35;
      ctx.strokeStyle = "rgba(111,86,70,0.26)";
      ctx.stroke();

      ctx.restore();

      // Texture removed for performance
    }

    function drawHandle() {
      ctx.save();

      ctx.shadowColor = "rgba(111, 86, 70, 0.2)";
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;

      ctx.beginPath();
      ctx.arc(handle.x, handle.y, 5.3, 0, Math.PI * 2);
      ctx.fillStyle = completed ? "rgba(232,164,111,0.48)" : "#e8a46f";
      ctx.fill();

      ctx.shadowColor = "transparent";
      ctx.lineWidth = 2.4;
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.stroke();

      ctx.restore();
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawBadge() {
      const percent = Math.round(progress * 100);

      ctx.save();
      ctx.translate(figure.badge.x, figure.badge.y);

      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.strokeStyle = "rgba(111,86,70,0.1)";
      ctx.lineWidth = 1;

      roundRect(-28, -15, 56, 30, 15);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#9b6540";
      ctx.font = "18px 'Coming Soon', cursive";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(percent + "%", 0, 1);

      ctx.restore();
    }

    function drawPaper() {
      ctx.clearRect(0, 0, view.width, view.height);
      drawMainShadow();
      drawBasePaper();
      drawTarget();
      drawFoldedFlap();
      drawBadge();
      drawHandle();
    }

    function updateStatus() {
      const percent = Math.round(progress * 100);

      if (completed) {
        statusText.textContent = "¡Pliegue completado!";
        return;
      }

      if (dragging && percent >= 90) {
        statusText.textContent = "Suelta para confirmar";
        return;
      }

      if (percent >= 72) {
        statusText.textContent = "Casi, alinea la figura";
        return;
      }

      if (percent >= 20) {
        statusText.textContent = "Bien, llévalo a la meta";
        return;
      }

      statusText.textContent = "Haz coincidir el papel con la figura punteada";
    }

    function render() {
      drawPaper();
      updateStatus();
    }

    function setProgressDiamonds() {
      progressDiamonds.innerHTML = "";
      const diamond = document.createElement("span");
      diamond.className = "diamond filled";
      progressDiamonds.appendChild(diamond);
    }

    function resetFigure() {
      dragging = false;
      completed = false;
      progress = 0;
      handle = { ...figure.handleStart };
      closeConfirmation();
      canvas.classList.remove("dragging");
      render();
    }

    function practiceAgain() {
      resetFigure();
    }

    function closeConfirmation() {
      confirmationOverlay.classList.remove("visible");
    }

        function saveProgress() {
      localStorage.setItem('origamiProgress', JSON.stringify({
        currentFigure: 1,
        completed: true,
        timestamp: Date.now()
      }));
    }

    function nextFigure() {
      // For now, just reset to the same figure
      // You can expand this to load different figures later
      confirmationOverlay.classList.remove("visible");
      resetFigure();
    }

    function confirmSuccess() {
      completed = true;
      dragging = false;
      progress = 1;
      handle = { ...figure.handleTarget };
      
      // Save progress
      saveProgress();
      setProgressDiamonds();
      
      // Update visuals first so the user sees the completed shape
      render(); 
      
      // Short delay before the window appears so the user can "observe"
      setTimeout(() => {
        confirmationOverlay.classList.add("visible");
      }, 800); 
    }


    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = view.width * dpr;
      canvas.height = view.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }

    canvas.addEventListener("pointerdown", event => {
      if (completed) return;

      const pointer = pointerToCanvas(event);
      if (distance(pointer, handle) > 50) return;

      dragging = true;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
    });

    canvas.addEventListener("pointermove", event => {
      if (!dragging || completed) return;

      const pointer = pointerToCanvas(event);

      handle = {
        x: clamp(pointer.x, -90, 440),
        y: clamp(pointer.y, -90, 520)
      };

      progress = progressFromHandle(handle);
      render();
      event.preventDefault();
    });

    window.addEventListener("pointerup", () => {
      if (!dragging) return;
      dragging = false;
      canvas.classList.remove("dragging");

      // Snap logic: at 90% accuracy, we trigger success
      if (progress >= 0.90) {
        completed = true;
        progress = 1;
        handle = { ...figure.handleTarget };
        
        // 1. Re-draw immediately so they see the perfect fit
        render(); 
        
        // 2. Small delay (0.6s) so they can observe before the window pops
        setTimeout(() => {
          const overlay = document.getElementById("confirmationOverlay");
          if (overlay) overlay.classList.add("visible");
        }, 600);
      } else {
        // If they missed, return to start
        resetFigure();
      }
    });


    window.addEventListener("pointercancel", () => {
      dragging = false;
      canvas.classList.remove("dragging");
      render();
    });

    window.addEventListener("resize", resizeCanvas);

    setProgressDiamonds();
    resetFigure();
    resizeCanvas();
  </script>
</body>
</html>
